<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-red-600 mb-6">Suzuki Celaya | Dashboard</h1>
        
        <div class="bg-white p-6 rounded-xl shadow-md mb-8">
            <h2 class="text-lg font-bold mb-4">Nueva Cita (Registro en Sheets)</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input id="nombre" placeholder="Nombre" class="p-2 border rounded">
                <input id="telefono" placeholder="Teléfono" class="p-2 border rounded">
                <select id="modelo" class="p-2 border rounded">
                    <option>Swift</option><option>Ignis</option><option>Grand Vitara</option>
                </select>
                <textarea id="mensaje" placeholder="Mensaje..." class="p-2 border rounded"></textarea>
            </div>
            <button onclick="enviar()" class="mt-4 bg-red-600 text-white px-6 py-2 rounded">Guardar en Sheets</button>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md">
            <canvas id="chart"></canvas>
        </div>
    </div>

    <script>
        function enviar() {
            var datos = {
                nombre: document.getElementById('nombre').value,
                telefono: document.getElementById('telefono').value,
                modelo: document.getElementById('modelo').value,
                mensaje: document.getElementById('mensaje').value
            };
            google.script.run.withSuccessHandler(() => alert('Guardado')).registrarCita(datos);
        }

        new Chart(document.getElementById('chart'), {
            type: 'bar',
            data: { labels: ['Swift', 'Ignis', 'Vitara'], datasets: [{ label: 'Citas', data: [12, 19, 3], backgroundColor: '#e11d48' }] }
        });
    </script>
</body>
</html>
