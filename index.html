<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Servicio Junio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-6">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Dashboard de Servicio - Junio</h1>
            <p class="text-gray-600">Resumen operativo mensual</p>
        </header>

        <!-- Tarjetas de KPIs -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-blue-500">
                <p class="text-sm text-gray-500 uppercase">Total Servicios</p>
                <p class="text-3xl font-bold text-gray-800" id="total-servicios">--</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-green-500">
                <p class="text-sm text-gray-500 uppercase">Completados</p>
                <p class="text-3xl font-bold text-gray-800" id="servicios-ok">--</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-red-500">
                <p class="text-sm text-gray-500 uppercase">Pendientes</p>
                <p class="text-3xl font-bold text-gray-800" id="servicios-pendientes">--</p>
            </div>
        </div>

        <!-- Gráficos -->
        <div class="bg-white p-6 rounded-lg shadow-sm">
            <h2 class="text-xl font-semibold mb-4">Distribución por Estado</h2>
            <canvas id="chartEstado" class="max-h-[300px]"></canvas>
        </div>
    </div>

    <script>
        // Simulando carga de datos desde el archivo (la lógica se integraría con la API de Sheets)
        const datosServicio = {
            total: 125,
            completados: 98,
            pendientes: 27
        };

        document.getElementById('total-servicios').textContent = datosServicio.total;
        document.getElementById('servicios-ok').textContent = datosServicio.completados;
        document.getElementById('servicios-pendientes').textContent = datosServicio.pendientes;

        const ctx = document.getElementById('chartEstado').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Completados', 'Pendientes'],
                datasets: [{
                    data: [datosServicio.completados, datosServicio.pendientes],
                    backgroundColor: ['#10B981', '#EF4444']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    </script>
</body>
</html>
