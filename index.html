<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Servicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-6">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Dashboard de Servicio</h1>
            <p class="text-gray-600">Selecciona el mes para ver el detalle</p>
        </header>

        <div id="tabs" class="flex space-x-2 mb-6 border-b border-gray-300">
            <!-- Los botones se generarán dinámicamente -->
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-blue-500">
                <p class="text-sm text-gray-500 uppercase" id="label-total">Total Servicios</p>
                <p class="text-3xl font-bold text-gray-800" id="total-servicios">--</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-green-500">
                <p class="text-sm text-gray-500 uppercase" id="label-ok">Completados</p>
                <p class="text-3xl font-bold text-gray-800" id="servicios-ok">--</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-red-500">
                <p class="text-sm text-gray-500 uppercase" id="label-pendientes">Pendientes</p>
                <p class="text-3xl font-bold text-gray-800" id="servicios-pendientes">--</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-sm">
            <h2 class="text-xl font-semibold mb-4" id="chart-title">Distribución por Estado</h2>
            <div class="h-[300px]">
                <canvas id="chartEstado"></canvas>
            </div>
        </div>
    </div>

    <script>
        const datosPorMes = {
            "Junio": { total: 125, completados: 98, pendientes: 27 },
            "Mayo": { total: 110, completados: 85, pendientes: 25 },
            "Abril": { total: 130, completados: 120, pendientes: 10 },
            "FACTURACIÓN": { total: 50000, completados: 42000, pendientes: 8000 }
        };

        let chartInstance = null;

        function renderDashboard(mes) {
            const data = datosPorMes[mes];
            
            // Actualizar Etiquetas dinámicamente
            const esFacturacion = mes === 'FACTURACIÓN';
            document.getElementById('label-total').textContent = esFacturacion ? 'Total Facturado' : 'Total Servicios';
            document.getElementById('label-ok').textContent = esFacturacion ? 'Cobrado' : 'Completados';
            document.getElementById('label-pendientes').textContent = esFacturacion ? 'Pendiente Cobro' : 'Pendientes';

            // Actualizar KPIs
            document.getElementById('total-servicios').textContent = esFacturacion ? `$${data.total.toLocaleString()}` : data.total;
            document.getElementById('servicios-ok').textContent = esFacturacion ? `$${data.completados.toLocaleString()}` : data.completados;
            document.getElementById('servicios-pendientes').textContent = esFacturacion ? `$${data.pendientes.toLocaleString()}` : data.pendientes;

            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Completados', 'Pendientes'],
                    datasets: [{
                        data: [data.completados, data.pendientes],
                        backgroundColor: ['#10B981', '#EF4444']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        const tabsContainer = document.getElementById('tabs');
        Object.keys(datosPorMes).forEach((mes, index) => {
            const btn = document.createElement('button');
            btn.textContent = mes;
            btn.className = `px-4 py-2 font-medium text-sm rounded-t-lg ${index === 0 ? 'bg-white border-x border-t border-gray-300' : 'bg-gray-200 text-gray-600 hover:bg-gray-300'}`;
            btn.onclick = () => {
                // Actualizar estilos
                Array.from(tabsContainer.children).forEach(child => child.className = 'px-4 py-2 font-medium text-sm rounded-t-lg bg-gray-200 text-gray-600 hover:bg-gray-300');
                btn.className = 'px-4 py-2 font-medium text-sm rounded-t-lg bg-white border-x border-t border-gray-300';
                renderDashboard(mes);
            };
            tabsContainer.appendChild(btn);
        });

        // Inicial
        renderDashboard("Junio");
    </script>
</body>
</html>
